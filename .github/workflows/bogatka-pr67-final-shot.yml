name: Capture PR 67 final two-card shot

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'ui-recommendation-progress-refine'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1
      - name: Capture screenshots
        run: |
          mkdir -p /tmp/bogatka-pr67-final-shot
          cat > capture.cjs <<'NODE'
          const {chromium}=require('@playwright/test');
          const APP='http://127.0.0.1:4174/bogatka-field-8f3c7d/?review=pr67-final-shot';
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage();
            await page.addInitScript(()=>localStorage.setItem('bogatka_access_authorized_v1','1'));
            async function open(width,height){
              await page.setViewportSize({width,height});
              await page.goto(APP,{waitUntil:'domcontentloaded'});
              await page.waitForFunction(()=>Boolean(window.BogatkaCardProgressV448?.ready&&window.BogatkaLocationCardCollapseV422?.ready&&document.querySelector('.location-actions [data-card-recommendation-v448]')),{timeout:30000});
              await page.waitForTimeout(600);
            }
            await open(1600,1200);
            if(await page.locator('[data-location-card]').count()<2){
              await page.locator('#addLocationBtn').click();
              await page.locator('#locationTitle').fill('ул. Белуша, 41А');
              await page.locator('#locationAddress').fill('Гродно, ул. Белуша, 41А');
              await page.locator('#locationNote').fill('Альтернатива первой локации');
              await page.locator('#saveLocationBtn').click();
              await page.waitForFunction(()=>document.querySelectorAll('[data-location-card]').length>=2,{timeout:15000});
            }
            await page.waitForFunction(()=>[...document.querySelectorAll('[data-location-card]')].slice(0,2).every(card=>card.querySelector('.location-collapse-toggle-v422')&&card.querySelector('.location-actions [data-card-recommendation-v448]')),{timeout:15000});
            await page.evaluate(()=>{
              window.BogatkaLocationCardCollapseV422.enhanceAll();
              const cards=[...document.querySelectorAll('[data-location-card]')];
              cards.forEach((card,index)=>{
                window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false});
                if(index>1)card.style.display='none';
              });
              const locations=document.querySelector('#locations');
              for(const child of [...locations.children]){
                if(!child.matches('[data-location-card]'))child.style.display='none';
              }
            });
            await page.waitForTimeout(400);
            await page.locator('#locations').screenshot({path:'/tmp/bogatka-pr67-final-shot/01-desktop-two-collapsed-cards.png'});

            await open(1600,1100);
            const first=page.locator('[data-location-card]').first();
            await first.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            const progress=first.locator('.progress-card-toggle-v462');
            if(await progress.getAttribute('aria-expanded')!=='true')await progress.click();
            await first.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-pr67-final-shot/02-desktop-expanded-progress.png'});

            await open(390,1000);
            const mobile=page.locator('[data-location-card]').first();
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false}));
            await mobile.locator(':scope > .location-head').screenshot({path:'/tmp/bogatka-pr67-final-shot/03-mobile-location-header-actions.png'});
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            const mobileProgress=mobile.locator('.progress-card-toggle-v462');
            if(await mobileProgress.getAttribute('aria-expanded')!=='true')await mobileProgress.click();
            await mobile.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-pr67-final-shot/04-mobile-expanded-progress.png'});
            await browser.close();
          })().catch(error=>{console.error(error);process.exit(1)});
          NODE
          python3 -m http.server 4174 --bind 127.0.0.1 >/tmp/bogatka-final-shot-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4174/bogatka-field-8f3c7d/ >/dev/null && break
            sleep 1
          done
          node capture.cjs
          rm capture.cjs
      - name: Clean runner
        run: |
          rm -f .github/workflows/bogatka-pr67-final-shot.yml
          rm -f bogatka-field-8f3c7d/.pr67-final-shot-trigger
          rm -rf node_modules package-lock.json test-results
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clean final screenshot runner'
          git push origin HEAD:ui-recommendation-progress-refine
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-pr67-final-shot
          path: |
            /tmp/bogatka-pr67-final-shot
            /tmp/bogatka-final-shot-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 7
