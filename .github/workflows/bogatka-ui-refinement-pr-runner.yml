name: Export Bogatka refinement branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export-branch:
    if: github.head_ref == 'ui-recommendation-progress-refine'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Package repository snapshot
        run: |
          tar --exclude=.git -czf /tmp/bogatka-refinement-branch.tar.gz .

      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-refinement-branch-snapshot
          path: /tmp/bogatka-refinement-branch.tar.gz
          if-no-files-found: error
          retention-days: 2
