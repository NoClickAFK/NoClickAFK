name: Run bounded Bogatka UI refinement

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-test-capture:
    if: github.head_ref == 'ui-recommendation-progress-refine'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract and apply the bounded patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          source=Path('.github/workflows/bogatka-ui-refinement-apply.yml').read_text(encoding='utf-8')
          start=source.index("          python3 - <<'PY'\n")+len("          python3 - <<'PY'\n")
          end=source.index("\n          PY\n\n      - name: Install Chromium",start)
          script=textwrap.dedent(source[start:end])
          Path('/tmp/apply-bogatka-ui.py').write_text(script,encoding='utf-8')
          PY
          python3 /tmp/apply-bogatka-ui.py

      - name: Install Chromium
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1

      - name: Run bounded targeted tests
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null && break
            sleep 1
          done
          npx playwright test \
            bogatka-field-8f3c7d/tests/location-card-collapse-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/location-card-collapse-mobile-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/card-progress-v448.spec.mjs \
            bogatka-field-8f3c7d/tests/ui-refine-v462.spec.mjs \
            bogatka-field-8f3c7d/tests/inspection-layout-v461.spec.mjs \
            bogatka-field-8f3c7d/tests/location-data-v452.spec.mjs \
            --workers=1 --reporter=line | tee /tmp/bogatka-targeted-tests.log

      - name: Extract and run screenshot capture
        run: |
          mkdir -p /tmp/bogatka-ui-review
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          source=Path('.github/workflows/bogatka-ui-refinement-apply.yml').read_text(encoding='utf-8')
          start=source.index("          cat > /tmp/capture-bogatka-ui.cjs <<'NODE'\n")+len("          cat > /tmp/capture-bogatka-ui.cjs <<'NODE'\n")
          end=source.index("\n          NODE\n",start)
          script=textwrap.dedent(source[start:end])
          Path('/tmp/capture-bogatka-ui.cjs').write_text(script,encoding='utf-8')
          PY
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-screenshot-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null && break
            sleep 1
          done
          node /tmp/capture-bogatka-ui.cjs

      - name: Commit the focused result and remove temporary runners
        run: |
          rm .github/workflows/bogatka-ui-refinement-apply.yml
          rm .github/workflows/bogatka-ui-refinement-pr-runner.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bogatka-field-8f3c7d .github/workflows/bogatka-ui-refinement-apply.yml .github/workflows/bogatka-ui-refinement-pr-runner.yml
          git commit -m 'Refine recommendation and progress UI'
          git push origin HEAD:ui-recommendation-progress-refine

      - name: Upload visual-review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-ui-recommendation-review
          path: |
            /tmp/bogatka-ui-review
            /tmp/bogatka-targeted-tests.log
            /tmp/bogatka-http.log
            /tmp/bogatka-screenshot-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 7
