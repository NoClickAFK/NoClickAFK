name: Finalize Bogatka UI refinement

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'ui-recommendation-progress-refine'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply the validated payload
        run: |
          cat .github/bogatka-ui-payload.part00 .github/bogatka-ui-payload.part01 \
            .github/bogatka-ui-payload.part02a .github/bogatka-ui-payload.part02b \
            .github/bogatka-ui-payload.part02c .github/bogatka-ui-payload.part02d \
            .github/bogatka-ui-payload.part03 .github/bogatka-ui-payload.part04a \
            .github/bogatka-ui-payload.part04b00 .github/bogatka-ui-payload.part04b01 \
            .github/bogatka-ui-payload.part04b02 .github/bogatka-ui-payload.part04c \
            | base64 -d | tar -xzf -
          node --check bogatka-field-8f3c7d/card-progress-v448.js

      - name: Install Chromium
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1

      - name: Capture final screenshots
        run: |
          mkdir -p /tmp/bogatka-ui-review
          cat > capture.cjs <<'NODE'
          const {chromium}=require('@playwright/test');
          const APP='http://127.0.0.1:4174/bogatka-field-8f3c7d/?review=final';
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage();
            await page.addInitScript(()=>localStorage.setItem('bogatka_access_authorized_v1','1'));
            async function open(width,height){
              await page.setViewportSize({width,height});
              await page.goto(APP,{waitUntil:'domcontentloaded'});
              await page.waitForFunction(()=>Boolean(
                window.BogatkaCardProgressV448?.ready&&
                window.BogatkaLocationCardCollapseV422?.ready&&
                window.BogatkaLocationDataV452?.ready&&
                window.BogatkaInspectionLayoutV461?.ready&&
                document.querySelector('[data-field="listingUrl"]')
              ),{timeout:30000});
              await page.waitForTimeout(500);
            }
            await open(1600,1200);
            await page.evaluate(()=>document.querySelectorAll('[data-location-card]').forEach(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false})));
            await page.waitForTimeout(300);
            const cards=page.locator('[data-location-card]');
            const boxes=[];
            for(let i=0;i<3;i++)boxes.push(await cards.nth(i).boundingBox());
            const x=Math.min(...boxes.map(b=>b.x)),y=Math.min(...boxes.map(b=>b.y));
            const right=Math.max(...boxes.map(b=>b.x+b.width)),bottom=Math.max(...boxes.map(b=>b.y+b.height));
            await page.screenshot({path:'/tmp/bogatka-ui-review/01-desktop-collapsed-location-cards.png',clip:{x,y,width:right-x,height:bottom-y}});

            const first=cards.first();
            await first.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            await first.evaluate(card=>{
              const set=(field,value,event)=>{
                const control=card.querySelector(`[data-field="${field}"]`);
                control.value=value;
                control.dispatchEvent(new Event(event,{bubbles:true}));
              };
              set('objectSource','Объявление','change');
              set('listingUrl','https://example.com/object-17','input');
              set('inspectionParticipants','Анатолий, Антон','input');
            });
            await page.waitForTimeout(600);
            for(const selector of ['.inspection-card-v416 .panel-toggle-v419','.landlord-card-v416 .panel-toggle-v419']){
              const toggle=first.locator(selector);
              if(await toggle.getAttribute('aria-expanded')!=='true')await toggle.click();
            }
            await page.waitForTimeout(250);
            await first.locator('.location-panels-v419').screenshot({path:'/tmp/bogatka-ui-review/02-desktop-inspection-landlord-url-padding.png'});
            const progress=first.locator('.progress-card-toggle-v462');
            if(await progress.getAttribute('aria-expanded')!=='true')await progress.click();
            await first.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-ui-review/03-desktop-progress-four-metrics.png'});

            await open(390,1000);
            const mobile=page.locator('[data-location-card]').first();
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false}));
            await mobile.locator(':scope > .location-head').screenshot({path:'/tmp/bogatka-ui-review/04-mobile-location-header-status.png'});
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            const mobileProgress=mobile.locator('.progress-card-toggle-v462');
            if(await mobileProgress.getAttribute('aria-expanded')!=='true')await mobileProgress.click();
            await mobile.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-ui-review/05-mobile-progress-metric-wrapping.png'});
            await browser.close();
          })().catch(error=>{console.error(error);process.exit(1)});
          NODE
          python3 -m http.server 4174 --bind 127.0.0.1 > /tmp/bogatka-screenshot-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4174/bogatka-field-8f3c7d/ >/dev/null && break
            sleep 1
          done
          node capture.cjs
          rm capture.cjs

      - name: Commit only focused source and test files
        run: |
          rm -f .github/bogatka-ui-payload.b64 .github/bogatka-ui-payload.part*
          rm -f .github/workflows/bogatka-ui-refinement-apply.yml .github/workflows/bogatka-ui-refinement-pr-runner.yml
          rm -f bogatka-field-8f3c7d/.noop bogatka-field-8f3c7d/.noop2 bogatka-field-8f3c7d/.noop3
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refine recommendation and progress UI'
          git push origin HEAD:ui-recommendation-progress-refine

      - name: Upload final screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-ui-recommendation-review-final
          path: |
            /tmp/bogatka-ui-review
            /tmp/bogatka-screenshot-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 7
