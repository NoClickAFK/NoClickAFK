name: PR73 inspect reviewed regression fixes

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  inspect-fixes:
    if: github.event.pull_request.number == 73
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: archive-permanent-delete-tombstones
          fetch-depth: 0
      - name: Validate patch and capture details
        shell: bash
        run: |
          set +e
          git apply --verbose --check .github/pr73-regression-fixes.patch > /tmp/pr73-apply.log 2>&1
          echo "exit=$?" >> /tmp/pr73-apply.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr73-regression-patch-check
          path: /tmp/pr73-apply.log
          if-no-files-found: error
          retention-days: 2
