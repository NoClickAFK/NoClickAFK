name: PR73 apply validated regression fixes

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.event.pull_request.number == 73
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: archive-permanent-delete-tombstones
          fetch-depth: 0
      - name: Apply validated runtime and test corrections
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/pr73-regression-fixes.patch
          git apply .github/pr73-regression-fixes.patch
          rm .github/pr73-regression-fixes.patch
          rm .github/workflows/pr73-apply-regression-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix archive permissions and regression baselines'
          git push origin HEAD:archive-permanent-delete-tombstones
