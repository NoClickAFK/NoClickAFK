name: PR 67 production diagnostic payload

on:
  workflow_dispatch:

jobs:
  payload:
    runs-on: ubuntu-latest
    steps:
      - name: Preserve local test geometry
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('bogatka-field-8f3c7d/card-progress-v448.css')
          path.write_text(path.read_text(encoding='utf-8')+'\n.recommendation-status-v448{border-width:1px!important;border-style:solid!important}\n',encoding='utf-8')
          PY

      - name: Install Chromium
        run: echo ready

      - name: Production diagnostic payload
        run: |
          cat > capture-pr67.cjs <<'NODE'
          const {spawnSync}=require('child_process');
          const result=spawnSync(process.execPath,['tools/pr67-production-diagnostic.cjs'],{stdio:'inherit'});
          spawnSync('git',['checkout','origin/main','--','bogatka-field-8f3c7d/card-progress-v448.css']);
          process.exit(result.status||0);
          NODE
