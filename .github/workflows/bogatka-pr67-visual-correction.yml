name: Apply PR 67 visual correction

on:
  push:
    branches: [ui-recommendation-progress-refine]

permissions:
  contents: write

jobs:
  apply-test-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-recommendation-progress-refine
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply bounded canonical corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          ROOT=Path('bogatka-field-8f3c7d')

          def read(rel):
              return (ROOT/rel).read_text(encoding='utf-8')

          def write(rel,text):
              (ROOT/rel).write_text(text,encoding='utf-8')

          def replace_once(text,old,new,label):
              count=text.count(old)
              if count!=1:
                  raise SystemExit(f'{label}: expected 1 exact match, found {count}')
              return text.replace(old,new,1)

          def sub_once(text,pattern,repl,label,flags=re.S):
              updated,count=re.subn(pattern,repl,text,count=1,flags=flags)
              if count!=1:
                  raise SystemExit(f'{label}: expected 1 regex match, found {count}')
              return updated

          # Canonical progress and location-status implementation.
          rel='card-progress-v448.js'
          text=read(rel)

          text=sub_once(text,
              r"  function setRecommendationStatus\(node,recommendation=\{\}\)\{.*?\n  \}",
              """  function setRecommendationStatus(node,recommendation={}){
            if(!node)return;
            const semantic=recommendation.className||'empty';
            node.className=`recommendation-status-v448 ${semantic}`;
            node.dataset.recommendationClass=semantic;
            text(node,recommendation.label||'Недостаточно данных');
          }""",
              'replace recommendation status helper')

          text=sub_once(text,
              r"  function ensureHeader\(card\)\{.*?\n  \}\n\n  function ensureOverview\(card\)\{",
              """  function ensureHeader(card){
            const scorebox=card.querySelector(':scope > .location-head .scorebox');
            if(scorebox){
              scorebox.hidden=true;
              scorebox.setAttribute('aria-hidden','true');
              scorebox.classList.add('card-metric-hidden-v448');
            }
            const actions=card.querySelector(':scope > .location-head .location-actions');
            let head=card.querySelector('[data-card-recommendation-v448]')?.closest('.decision-head-v340')||card.querySelector(':scope > .location-head .decision-head-v340');
            if(!head||!actions)return null;
            if(head.dataset.cardProgressV448!=='1'){
              head.dataset.cardProgressV448='1';
              head.classList.add('card-recommendation-head-v448','location-action-status-v448');
              head.innerHTML='<strong class=\"recommendation-status-v448 empty\" data-card-recommendation-v448>Недостаточно данных</strong>';
            }
            let buttons=actions.querySelector(':scope > .location-action-buttons-v448');
            if(!buttons){
              buttons=document.createElement('div');
              buttons.className='location-action-buttons-v448';
              actions.prepend(buttons);
            }
            for(const child of [...actions.children]){
              if(child===buttons||child===head)continue;
              buttons.appendChild(child);
            }
            if(head.parentElement!==actions)actions.appendChild(head);
            return head;
          }

          function ensureOverview(card){""",
              'move status into action row')

          text=replace_once(text,
              '<article class="progress-metric-v448"><span>Качество локации</span><strong data-progress-quality-v448>Нет оценки</strong><small data-progress-quality-meta-v448>Оценено 0 из 14 критериев</small></article>',
              '<article class="progress-metric-v448"><span>Качество локации</span><strong data-progress-quality-v448>Нет оценки</strong><small data-progress-quality-meta-v448>Оцените критерии ниже в карточке локации</small></article>',
              'replace initial quality explanation')

          text=replace_once(text,
              '<div class="score-explanation-v448"><strong>Как считается качество:</strong> 1 балл = 0, 2 = 25, 3 = 50, 4 = 75, 5 = 100. Вес критериев учитывается. Пустые критерии не занижают качество — они уменьшают надёжность оценки.</div>',
              '<div class="score-explanation-v448"><strong>Что означают показатели</strong><span>Оценки ставятся ниже в разделе оценки локации. Качество показывает средний результат по заполненным критериям, а надёжность — сколько из 14 критериев уже оценено. Пустые критерии не снижают качество, но уменьшают надёжность</span></div>',
              'replace visible quality explanation')

          text=replace_once(text,
              "    setRecommendationStatus(header.querySelector('[data-card-recommendation-v448]'),recommendation);\n    setRecommendationStatus(overview.querySelector('[data-progress-card-summary-v462]'),recommendation);",
              "    setRecommendationStatus(header.querySelector('[data-card-recommendation-v448]'),recommendation);",
              'remove progress status render')

          text=replace_once(text,
              "    text(overview.querySelector('[data-progress-quality-meta-v448]'),`Оценено ${answered} из 14 критериев`);",
              "    text(overview.querySelector('[data-progress-quality-meta-v448]'),answered?'Средний результат по заполненным критериям':'Оцените критерии ниже в карточке локации');",
              'clarify quality card copy')

          text=sub_once(text,
              r"function syncSummary\(overview\)\{.*?\n\}\n\nfunction ensureProgress\(card\)\{.*?\n\}\n\nfunction applyLayoutGuards\(card\)\{",
              """function ensureProgress(card){
          const overview=card.querySelector('.decision-overview-v340.decision-progress-v448');
          if(!overview)return false;
          if(overview.dataset.uiRefineV462==='1'){
            overview.querySelector('[data-progress-card-summary-v462]')?.remove();
            ensureFillPlan(overview,card);
            return true;
          }
          const heading=overview.querySelector(':scope > .progress-heading-v448');
          if(!heading)return false;
          const titleBlock=heading.querySelector(':scope > div:first-child');
          const content=document.createElement('div');
          content.className='progress-card-content-v462';
          while(overview.firstChild)content.append(overview.firstChild);
          heading.remove();
          const button=document.createElement('button');
          const copy=document.createElement('span');
          const title=document.createElement('strong');
          const note=document.createElement('span');
          const arrow=document.createElement('i');
          button.type='button';
          button.className='progress-card-toggle-v462';
          copy.className='progress-card-toggle-copy-v462';
          title.textContent=titleBlock?.querySelector('strong')?.textContent||'Общая оценка и готовность данных';
          note.textContent=titleBlock?.querySelector('span')?.textContent||'Здесь видно, насколько подходит локация и сколько данных уже собрано';
          arrow.className='progress-card-chevron-v462';
          arrow.setAttribute('aria-hidden','true');
          copy.append(title,note);
          button.append(copy,arrow);
          overview.append(button,content);
          const key=`bogatka_progress_open_v462:${card.dataset.locationCard||'location'}`;
          setOpen(button,content,read(key)==='1',null);
          button.addEventListener('click',()=>setOpen(button,content,button.getAttribute('aria-expanded')!=='true',key));
          overview.classList.add('progress-card-v462');
          overview.dataset.uiRefineV462='1';
          ensureFillPlan(overview,card);
          return true;
          }

          function applyLayoutGuards(card){""",
              'remove progress header status')

          for forbidden in ['data-progress-card-summary-v462','progress-card-summary-v462','1 балл = 0']:
              if forbidden in text:
                  raise SystemExit(f'forbidden visible progress/status token remains: {forbidden}')
          for required in [
              'Оцените критерии ниже в карточке локации',
              'Средний результат по заполненным критериям',
              'Что означают показатели',
              'Оценки ставятся ниже в разделе оценки локации. Качество показывает средний результат по заполненным критериям, а надёжность — сколько из 14 критериев уже оценено. Пустые критерии не снижают качество, но уменьшают надёжность',
              'location-action-buttons-v448',
          ]:
              if required not in text:
                  raise SystemExit(f'missing required implementation text: {required}')
          write(rel,text)

          # Canonical stylesheet only; no new override layer.
          rel='card-progress-v448.css'
          css=read(rel)
          css=sub_once(css,
              r"\.card-metric-hidden-v448\{.*?\.location-head-side-v422>\.location-collapse-toggle-v422\{[^{}]*\}",
              """.card-metric-hidden-v448{display:none!important}
          .card-recommendation-head-v448{display:flex!important;align-items:center!important;justify-content:flex-end!important;width:auto!important;max-width:100%!important;margin-left:auto!important;align-self:center!important}
          .recommendation-status-v448{display:inline-flex;align-items:center;justify-content:center;width:max-content;max-width:220px;min-height:32px;padding:6px 10px;border:1px solid transparent;border-radius:10px;font-size:11px;font-weight:700;line-height:1.2;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box}
          .recommendation-status-v448.empty{border-color:#e5bcbc;background:#fff1f1;color:#8a3f3f}
          .recommendation-status-v448.weak{border-color:#dda9a9;background:#fbe9e9;color:#873333}
          .recommendation-status-v448.medium,.recommendation-status-v448.risk{border-color:#dfbd68;background:#fff3d4;color:#745009}
          .recommendation-status-v448.good{border-color:#afd2bd;background:#edf8f1;color:#236646}
          .recommendation-status-v448.priority{border-color:#176342;background:#176342;color:#fff}
          .recommendation-status-v448.stop{border-color:#8f2f2f;background:#8f2f2f;color:#fff}
          html [data-location-card] .location-actions{display:flex!important;align-items:center!important;flex-wrap:wrap!important;gap:7px!important;width:100%!important;max-width:100%!important;min-width:0!important;box-sizing:border-box!important}
          .location-action-buttons-v448{display:flex;align-items:center;flex-wrap:wrap;gap:7px;min-width:0;max-width:100%}
          html [data-location-card] .location-actions>.card-recommendation-head-v448{flex:0 0 auto!important;margin-left:auto!important}
          .location-head-side-v422{display:flex!important;align-items:flex-start!important;justify-content:flex-end!important;width:auto!important;min-width:34px!important;max-width:34px!important}
          .location-head-side-v422>.scorebox{display:none!important}
          .location-head-side-v422>.location-collapse-toggle-v422{flex:0 0 auto!important;align-self:flex-start!important}""",
              'replace action-row and header-side styles')

          css=sub_once(css,
              r"\.score-explanation-v448\{[^{}]*\}\n\.score-explanation-v448 strong\{[^{}]*\}",
              """.score-explanation-v448{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 6px;margin-top:10px;padding:10px 12px;border-left:3px solid #5d9c7d;border-radius:10px;background:#edf6f1;color:#5d6d64;font-size:11px;line-height:1.5}
          .score-explanation-v448 strong{flex:0 0 auto;color:#315f49}.score-explanation-v448 span{min-width:0}""",
              'replace explanation styles')

          css=replace_once(css,
              'grid-template-columns:minmax(0,1fr) auto 34px!important;',
              'grid-template-columns:minmax(0,1fr) 34px!important;',
              'remove progress status grid column')
          css=re.sub(r"\nhtml \.progress-card-summary-v462\{[^{}]*\}","",css,count=1)

          css=replace_once(css,
              "@media(max-width:900px){\n  html .location-head-side-v422{width:100%!important;max-width:100%!important;justify-content:flex-end!important}\n}",
              "@media(max-width:900px){\n  html .location-head-side-v422{width:34px!important;max-width:34px!important;justify-content:flex-end!important}\n}",
              'keep arrow upper-right below desktop')

          css=sub_once(css,
              r"  html \.location-head\{display:grid!important;grid-template-columns:minmax\(0,1fr\)!important;gap:10px!important\}\n  html \.location-head>\.location-title-wrap,\n  html \.location-head>\.location-head-side-v422\{.*?\n  html \.progress-card-chevron-v462\{grid-column:2!important;grid-row:1/3!important\}",
              """  html .location-head{display:grid!important;grid-template-columns:minmax(0,1fr) 34px!important;align-items:start!important;gap:10px!important}
          html .location-head>.location-title-wrap{grid-column:1!important;width:100%!important;max-width:100%!important;min-width:0!important;box-sizing:border-box!important}
          html .location-head>.location-head-side-v422{grid-column:2!important;width:34px!important;max-width:34px!important;min-width:34px!important;box-sizing:border-box!important}
          html .location-head-side-v422{display:flex!important;justify-content:flex-end!important;gap:0!important}
          html [data-location-card] .location-actions{align-items:flex-start!important}
          html .location-action-buttons-v448{flex:1 1 100%!important;width:100%!important}
          html .location-actions>.card-recommendation-head-v448{flex:0 0 auto!important;margin-left:auto!important}
          html .progress-card-toggle-v462{grid-template-columns:minmax(0,1fr) 32px!important}
          html .progress-card-chevron-v462{grid-column:2!important;grid-row:1!important}""",
              'replace mobile header and progress layout')

          if 'progress-card-summary-v462' in css:
              raise SystemExit('progress summary CSS remains')
          if '1 балл = 0' in css:
              raise SystemExit('old formula remains in CSS')
          write(rel,css)

          # Desktop location-card tests.
          rel='tests/location-card-collapse-v422.spec.mjs'
          spec=read(rel)
          spec=spec.replace("  await expect(first.locator('[data-card-recommendation-v448]')).toBeVisible();\n  await expect(first.locator('[data-card-recommendation-v448]')).toBeVisible();","  await expect(first.locator('.location-actions [data-card-recommendation-v448]')).toBeVisible();")
          spec=sub_once(spec,
              r"test\('header keeps only the compact semantic status and separate collapse control'.*?\n\}\);",
              """test('status is in the action row while collapse control stays in the upper header',async({page})=>{
            await openApp(page);
            const result=await page.locator('[data-location-card]').first().evaluate(card=>{
              const head=card.querySelector(':scope > .location-head');
              const actions=head.querySelector('.location-actions');
              const buttons=actions.querySelector(':scope > .location-action-buttons-v448');
              const status=actions.querySelector(':scope > .card-recommendation-head-v448 [data-card-recommendation-v448]');
              const side=head.querySelector(':scope > .location-head-side-v422');
              const toggle=side.querySelector(':scope > .location-collapse-toggle-v422');
              const actionRect=actions.getBoundingClientRect();
              const buttonsRect=buttons.getBoundingClientRect();
              const statusRect=status.getBoundingClientRect();
              const toggleRect=toggle.getBoundingClientRect();
              const headRect=head.getBoundingClientRect();
              const style=getComputedStyle(status);
              return{
                statusParent:status.closest('.location-actions')===actions,
                buttonGroupParent:buttons.parentElement===actions,
                toggleParent:toggle.parentElement===side,
                statusInSide:side.contains(status),
                statusWidth:Math.round(statusRect.width*10)/10,
                statusHeight:Math.round(statusRect.height*10)/10,
                statusBorderWidth:style.borderTopWidth,
                statusRadius:style.borderTopLeftRadius,
                statusFontSize:style.fontSize,
                centerDelta:Math.abs((buttonsRect.top+buttonsRect.height/2)-(statusRect.top+statusRect.height/2)),
                rightGap:Math.abs(actionRect.right-statusRect.right),
                buttonStatusGap:statusRect.left-buttonsRect.right,
                toggleTop:toggleRect.top-headRect.top,
                statusTop:statusRect.top-headRect.top,
                rawVisible:getComputedStyle(side.querySelector(':scope > .scorebox')).display!=='none',
              };
            });
            expect(result.statusParent).toBe(true);
            expect(result.buttonGroupParent).toBe(true);
            expect(result.toggleParent).toBe(true);
            expect(result.statusInSide).toBe(false);
            expect(result.statusWidth).toBeLessThan(210);
            expect(result.statusHeight).toBeGreaterThanOrEqual(30);
            expect(result.statusBorderWidth).toBe('1px');
            expect(result.statusRadius).toBe('10px');
            expect(result.statusFontSize).toBe('11px');
            expect(result.centerDelta).toBeLessThanOrEqual(2);
            expect(result.rightGap).toBeLessThanOrEqual(2);
            expect(result.buttonStatusGap).toBeGreaterThanOrEqual(7);
            expect(result.toggleTop).toBeLessThan(result.statusTop);
            expect(result.rawVisible).toBe(false);
          });""",
              'replace desktop status placement test')
          write(rel,spec)

          # Mobile location-card test.
          rel='tests/location-card-collapse-mobile-v422.spec.mjs'
          spec=read(rel)
          spec=sub_once(spec,
              r"test\('mobile compact recommendation status stays overflow free'.*?\n\}\);\s*$",
              """test('mobile action area keeps the status without overflow while arrow stays upper-right',async({page})=>{
            await page.setViewportSize({width:390,height:844});
            await page.addInitScript(()=>localStorage.setItem('bogatka_access_authorized_v1','1'));
            await page.goto(APP_URL,{waitUntil:'networkidle'});
            await page.waitForFunction(()=>{
              const card=document.querySelector('[data-location-card]');
              return Boolean(window.BogatkaLocationCardCollapseV422?.ready&&window.BogatkaCardProgressV448?.ready&&card?.querySelector('.location-actions [data-card-recommendation-v448]'));
            });

            const layout=await page.locator('[data-location-card]').first().evaluate(card=>{
              const head=card.querySelector(':scope > .location-head');
              const actions=head.querySelector('.location-actions');
              const buttons=actions.querySelector('.location-action-buttons-v448');
              const status=actions.querySelector('[data-card-recommendation-v448]');
              const side=head.querySelector('.location-head-side-v422');
              const toggle=side.querySelector('.location-collapse-toggle-v422');
              const actionRect=actions.getBoundingClientRect();
              const statusRect=status.getBoundingClientRect();
              const toggleRect=toggle.getBoundingClientRect();
              const buttonRects=[...buttons.children].map(node=>node.getBoundingClientRect());
              const overlaps=buttonRects.some(rect=>!(rect.right<=statusRect.left||rect.left>=statusRect.right||rect.bottom<=statusRect.top||rect.top>=statusRect.bottom));
              return{
                headOverflow:head.scrollWidth-head.clientWidth,
                actionOverflow:actions.scrollWidth-actions.clientWidth,
                statusParent:status.closest('.location-actions')===actions,
                statusInSide:side.contains(status),
                toggleParent:toggle.parentElement===side,
                statusInside:statusRect.left>=actionRect.left-1&&statusRect.right<=actionRect.right+1,
                overlaps,
                statusHeight:statusRect.height,
                toggleAboveStatus:toggleRect.top<statusRect.top,
              };
            });
            expect(layout.headOverflow).toBeLessThanOrEqual(1);
            expect(layout.actionOverflow).toBeLessThanOrEqual(1);
            expect(layout.statusParent).toBe(true);
            expect(layout.statusInSide).toBe(false);
            expect(layout.toggleParent).toBe(true);
            expect(layout.statusInside).toBe(true);
            expect(layout.overlaps).toBe(false);
            expect(layout.statusHeight).toBeGreaterThanOrEqual(30);
            expect(layout.toggleAboveStatus).toBe(true);

            const card=page.locator('[data-location-card]').first();
            await card.locator('.location-collapse-toggle-v422').click();
            await expect(card.locator(':scope > .location-body')).toBeHidden();
            await expect(card.locator('.location-actions [data-card-recommendation-v448]')).toBeVisible();
          });
          """,
              'replace mobile status placement test')
          write(rel,spec)

          # Progress rendering and copy tests.
          rel='tests/card-progress-v448.spec.mjs'
          spec=read(rel)
          spec=sub_once(spec,
              r"test\('header and progress section keep only one compact semantic recommendation status'.*?\n\}\);\n\n(?=test\('recommendation status changes)",
              """test('location action row keeps the only visible status and progress copy is distinct',async({page})=>{
            const card=await openApp(page);
            const status=card.locator('.location-actions [data-card-recommendation-v448]');
            await expect(status).toBeVisible();
            await expect(status).toHaveText('Недостаточно оценок');
            await expect(status).toHaveClass(/empty/);
            await expect(card.locator('.location-head-side-v422 [data-card-recommendation-v448]')).toHaveCount(0);

            const outer=card.locator('.progress-card-toggle-v462');
            await expect(outer.locator('.progress-card-toggle-copy-v462 strong')).toHaveText('Общая оценка и готовность данных');
            await expect(outer.locator('.progress-card-toggle-copy-v462 span')).toHaveText('Здесь видно, насколько подходит локация и сколько данных уже собрано');
            await expect(outer.locator('[data-progress-card-summary-v462],.recommendation-status-v448')).toHaveCount(0);
            if(await outer.getAttribute('aria-expanded')!=='true')await outer.click();
            await expect(card.locator('.progress-metrics-v448>article')).toHaveCount(4);
            await expect(card.locator('[data-progress-quality-v448]')).toHaveText('Нет оценки');
            await expect(card.locator('[data-progress-quality-meta-v448]')).toHaveText('Оцените критерии ниже в карточке локации');
            await expect(card.locator('[data-progress-quality-meta-v448]')).not.toContainText('из 14 критериев');
            await expect(card.locator('[data-progress-coverage-meta-v448]')).toHaveText('Оценено 0 из 14 критериев');
            await expect(card.locator('.score-explanation-v448 strong')).toHaveText('Что означают показатели');
            await expect(card.locator('.score-explanation-v448 span')).toHaveText('Оценки ставятся ниже в разделе оценки локации. Качество показывает средний результат по заполненным критериям, а надёжность — сколько из 14 критериев уже оценено. Пустые критерии не снижают качество, но уменьшают надёжность');
            await expect(card.locator('.score-explanation-v448')).not.toContainText('1 балл = 0');

            const layout=await card.evaluate(node=>{
              const actions=node.querySelector('.location-actions');
              const buttons=actions.querySelector('.location-action-buttons-v448').getBoundingClientRect();
              const status=actions.querySelector('[data-card-recommendation-v448]').getBoundingClientRect();
              const metrics=node.querySelector('.progress-metrics-v448');
              const articles=[...metrics.children].map(item=>item.getBoundingClientRect());
              return{
                actionOverflow:actions.scrollWidth-actions.clientWidth,
                centerDelta:Math.abs((buttons.top+buttons.height/2)-(status.top+status.height/2)),
                metricCount:articles.length,
                widthDelta:Math.max(...articles.map(item=>item.width))-Math.min(...articles.map(item=>item.width)),
                progressStatusCount:node.querySelectorAll('[data-progress-card-summary-v462]').length,
              };
            });
            expect(layout.actionOverflow).toBeLessThanOrEqual(1);
            expect(layout.centerDelta).toBeLessThanOrEqual(2);
            expect(layout.metricCount).toBe(4);
            expect(layout.widthDelta).toBeLessThanOrEqual(2);
            expect(layout.progressStatusCount).toBe(0);
          });

          """,
              'replace main progress UI test')

          spec=sub_once(spec,
              r"test\('recommendation status changes shared semantic color without changing compact geometry'.*?\n\}\);",
              """test('location status keeps semantic color without a duplicated progress status',async({page})=>{
            const card=await openApp(page);
            const id=await card.getAttribute('data-location-card');
            const status=card.locator('.location-actions [data-card-recommendation-v448]');
            const before=await status.evaluate(element=>({
              background:getComputedStyle(element).backgroundColor,
              border:getComputedStyle(element).borderColor,
              height:element.getBoundingClientRect().height,
            }));
            await saveData(page,id,{
              status:'Новый объект',objectType:'Торговый центр',date:'2026-07-02',time:'11:00',floorLocation:'1-й этаж',
              premiseCondition:'Готово к работе',premiseAvailability:'Свободно',landlordReadiness:'Готов обсуждать',
              ownerName:'ООО Арендодатель',contactRole:'Собственник',contact:'Иван',contactPhone:'+375290000000',
              score:{housing:'5',occupied:'5',foot:'5',car:'5',parking:'5',stop:'5',anchor:'5',visibility:'5'},
              tech:{totalArea:'100',rentPerMonth:'3000',powerKw:'40',openingHours:'09:00–21:00',utilities:'500',repairEstimate:'10000'},
              pros:'Хорошая видимость',cons:'Нужно уточнить условия',risks:'Нет подтверждённых рисков',questions:'Уточнить срок аренды',decision:'Оставить',criticalDealConditions:{},
            });
            await expect(status).toHaveClass(/good/);
            await expect(status).toHaveText('Перспективно');
            await expect(card.locator('[data-progress-card-summary-v462]')).toHaveCount(0);
            const after=await status.evaluate(element=>({
              background:getComputedStyle(element).backgroundColor,
              border:getComputedStyle(element).borderColor,
              height:element.getBoundingClientRect().height,
            }));
            expect(after.background).not.toBe(before.background);
            expect(after.border).not.toBe(before.border);
            expect(after.height).toBeGreaterThanOrEqual(30);
          });""",
              'replace semantic status test')

          spec=replace_once(spec,
              "  await expect(card.locator('[data-progress-quality-v448]')).toHaveText('100/100');\n  await expect(card.locator('[data-progress-coverage-v448]')).toHaveText('57%');",
              "  await expect(card.locator('[data-progress-quality-v448]')).toHaveText('100/100');\n  await expect(card.locator('[data-progress-quality-meta-v448]')).toHaveText('Средний результат по заполненным критериям');\n  await expect(card.locator('[data-progress-quality-meta-v448]')).not.toContainText('из 14 критериев');\n  await expect(card.locator('[data-progress-coverage-v448]')).toHaveText('57%');",
              'add quality versus reliability copy assertion')

          spec=sub_once(spec,
              r"test\('compact status and progress metrics remain usable on a phone width'.*?\n\}\);\s*$",
              """test('mobile action status and progress metrics remain overflow free without duplication',async({page})=>{
            await page.setViewportSize({width:390,height:844});
            const card=await openApp(page);
            const outer=card.locator('.progress-card-toggle-v462');
            await expect(outer.locator('[data-progress-card-summary-v462],.recommendation-status-v448')).toHaveCount(0);
            if(await outer.getAttribute('aria-expanded')!=='true')await outer.click();
            const layout=await card.evaluate(node=>{
              const progress=node.querySelector('.decision-progress-v448');
              const actions=node.querySelector('.location-actions');
              const status=actions.querySelector('[data-card-recommendation-v448]').getBoundingClientRect();
              const actionRect=actions.getBoundingClientRect();
              return{
                progressOverflow:progress.scrollWidth-progress.clientWidth,
                actionOverflow:actions.scrollWidth-actions.clientWidth,
                metricColumns:getComputedStyle(progress.querySelector('.progress-metrics-v448')).gridTemplateColumns,
                statusInside:status.left>=actionRect.left-1&&status.right<=actionRect.right+1,
                progressStatusCount:progress.querySelectorAll('[data-progress-card-summary-v462]').length,
              };
            });
            expect(layout.progressOverflow).toBeLessThanOrEqual(1);
            expect(layout.actionOverflow).toBeLessThanOrEqual(1);
            expect(layout.metricColumns.split(' ').length).toBe(1);
            expect(layout.statusInside).toBe(true);
            expect(layout.progressStatusCount).toBe(0);
          });
          """,
              'replace mobile progress test')
          write(rel,spec)

          # Consolidated UI test updates; inspection assertions remain untouched.
          rel='tests/ui-refine-v462.spec.mjs'
          spec=read(rel)
          spec=sub_once(spec,
              r"test\('large recommendation copies are removed and shared compact status remains'.*?\n\}\);",
              """test('only the action row shows status and the progress header uses its full width',async({page})=>{
            const card=await openApp(page);
            const status=card.locator('.location-actions [data-card-recommendation-v448]');
            await expect(status).toBeVisible();
            await expect(status).toHaveText('Недостаточно оценок');
            await expect(card.locator('.location-head-side-v422 [data-card-recommendation-v448]')).toHaveCount(0);
            const outer=card.locator('.progress-card-toggle-v462');
            await expect(outer.locator('.progress-card-toggle-copy-v462 strong')).toHaveText('Общая оценка и готовность данных');
            await expect(outer.locator('.progress-card-toggle-copy-v462 span')).toHaveText('Здесь видно, насколько подходит локация и сколько данных уже собрано');
            await expect(outer.locator('[data-progress-card-summary-v462],.recommendation-status-v448')).toHaveCount(0);
            const result=await card.evaluate(node=>{
              const status=node.querySelector('.location-actions [data-card-recommendation-v448]');
              const actions=status.closest('.location-actions');
              const toggle=node.querySelector('.location-head-side-v422 .location-collapse-toggle-v422');
              const progressToggle=node.querySelector('.progress-card-toggle-v462');
              return{
                statusParent:status.closest('.location-actions')===actions,
                toggleInUpperSide:toggle.parentElement.classList.contains('location-head-side-v422'),
                progressColumns:getComputedStyle(progressToggle).gridTemplateColumns.split(' ').length,
                progressStatusCount:progressToggle.querySelectorAll('[data-progress-card-summary-v462],.recommendation-status-v448').length,
              };
            });
            expect(result.statusParent).toBe(true);
            expect(result.toggleInUpperSide).toBe(true);
            expect(result.progressColumns).toBe(2);
            expect(result.progressStatusCount).toBe(0);
          });""",
              'replace ui refinement status test')

          spec=replace_once(spec,
              "      recommendationCards:node.querySelectorAll('.progress-recommendation-v448').length,",
              "      recommendationCards:node.querySelectorAll('.progress-recommendation-v448').length,\n      progressStatusCount:node.querySelectorAll('[data-progress-card-summary-v462]').length,\n      explanationHeading:node.querySelector('.score-explanation-v448 strong')?.textContent,",
              'extend progress style result')
          spec=replace_once(spec,
              "  expect(styles.recommendationCards).toBe(0);",
              "  expect(styles.recommendationCards).toBe(0);\n  expect(styles.progressStatusCount).toBe(0);\n  expect(styles.explanationHeading).toBe('Что означают показатели');",
              'extend progress style assertions')
          write(rel,spec)

          # Location card polish keeps visual checks but follows the new structure.
          rel='tests/location-card-polish-v423.spec.mjs'
          spec=read(rel)
          spec=sub_once(spec,
              r"test\('header keeps a compact semantic status beside the separate collapse button'.*?\n\}\);",
              """test('status aligns with action buttons while the separate collapse button remains upper-right',async({page})=>{
            await openApp(page);
            const result=await page.locator('[data-location-card]').first().evaluate(card=>{
              const head=card.querySelector(':scope > .location-head');
              const actions=head.querySelector('.location-actions');
              const buttons=actions.querySelector('.location-action-buttons-v448');
              const status=actions.querySelector('[data-card-recommendation-v448]');
              const side=head.querySelector('.location-head-side-v422');
              const button=side.querySelector('.location-collapse-toggle-v422');
              const actionRect=actions.getBoundingClientRect();
              const buttonsRect=buttons.getBoundingClientRect();
              const statusRect=status.getBoundingClientRect();
              const statusStyle=getComputedStyle(status);
              const buttonRect=button.getBoundingClientRect();
              const buttonStyle=getComputedStyle(button);
              const arrowRect=button.querySelector('.location-collapse-chevron-v422').getBoundingClientRect();
              return{
                statusWidth:Math.round(statusRect.width),
                statusHeight:Math.round(statusRect.height),
                statusBorderWidth:statusStyle.borderTopWidth,
                statusBorderColor:statusStyle.borderTopColor,
                statusRadius:statusStyle.borderTopLeftRadius,
                statusFontSize:statusStyle.fontSize,
                statusInActions:status.closest('.location-actions')===actions,
                statusInSide:side.contains(status),
                actionCenterDelta:Math.abs((buttonsRect.top+buttonsRect.height/2)-(statusRect.top+statusRect.height/2)),
                statusRightGap:Math.abs(actionRect.right-statusRect.right),
                buttonWidth:Math.round(buttonRect.width),
                buttonHeight:Math.round(buttonRect.height),
                buttonBackground:buttonStyle.backgroundColor,
                buttonBorderWidth:buttonStyle.borderTopWidth,
                buttonRadius:buttonStyle.borderTopLeftRadius,
                buttonAboveStatus:buttonRect.top<statusRect.top,
                arrowCenterDeltaX:Math.abs((buttonRect.left+buttonRect.width/2)-(arrowRect.left+arrowRect.width/2)),
                arrowCenterDeltaY:Math.abs((buttonRect.top+buttonRect.height/2)-(arrowRect.top+arrowRect.height/2)),
              };
            });
            expect(result.statusWidth).toBeLessThan(210);
            expect(result.statusHeight).toBeGreaterThanOrEqual(30);
            expect(result.statusBorderWidth).toBe('1px');
            expect(result.statusBorderColor).not.toBe('rgba(0, 0, 0, 0)');
            expect(result.statusRadius).toBe('10px');
            expect(result.statusFontSize).toBe('11px');
            expect(result.statusInActions).toBe(true);
            expect(result.statusInSide).toBe(false);
            expect(result.actionCenterDelta).toBeLessThanOrEqual(2);
            expect(result.statusRightGap).toBeLessThanOrEqual(2);
            expect(result.buttonWidth).toBe(34);
            expect(result.buttonHeight).toBe(34);
            expect(result.buttonBackground).not.toBe('rgba(0, 0, 0, 0)');
            expect(result.buttonBorderWidth).toBe('1px');
            expect(result.buttonRadius).toBe('10px');
            expect(result.buttonAboveStatus).toBe(true);
            expect(result.arrowCenterDeltaX).toBeLessThanOrEqual(1);
            expect(result.arrowCenterDeltaY).toBeLessThanOrEqual(1);
          });""",
              'replace polish status placement test')
          write(rel,spec)

          # Final static guards.
          js=read('card-progress-v448.js')
          css=read('card-progress-v448.css')
          tests='\n'.join(read(name) for name in [
              'tests/location-card-collapse-v422.spec.mjs',
              'tests/location-card-collapse-mobile-v422.spec.mjs',
              'tests/card-progress-v448.spec.mjs',
              'tests/ui-refine-v462.spec.mjs',
              'tests/location-card-polish-v423.spec.mjs',
          ])
          assert 'data-progress-card-summary-v462' not in js
          assert 'progress-card-summary-v462' not in css
          assert '1 балл = 0' not in js
          assert 'Что означают показатели' in js
          assert 'location-action-buttons-v448' in js and 'location-action-buttons-v448' in css
          assert 'Оцените критерии ниже в карточке локации' in js
          assert 'Средний результат по заполненным критериям' in js
          assert 'data-progress-card-summary-v462' in tests
          PY

      - name: Install Chromium
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1

      - name: Run targeted tests
        run: |
          set -o pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ >/dev/null && break
            sleep 1
          done
          npx playwright test \
            bogatka-field-8f3c7d/tests/location-card-collapse-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/location-card-collapse-mobile-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/card-progress-v448.spec.mjs \
            bogatka-field-8f3c7d/tests/ui-refine-v462.spec.mjs \
            bogatka-field-8f3c7d/tests/location-card-polish-v423.spec.mjs \
            --workers=1 --reporter=line --timeout=45000 | tee /tmp/bogatka-targeted-tests.log

      - name: Capture desktop and mobile screenshots
        run: |
          mkdir -p /tmp/bogatka-pr67-review
          cat > capture-pr67.cjs <<'NODE'
          const {chromium}=require('@playwright/test');
          const APP='http://127.0.0.1:4174/bogatka-field-8f3c7d/?review=pr67-correction';
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage();
            await page.addInitScript(()=>localStorage.setItem('bogatka_access_authorized_v1','1'));
            async function open(width,height){
              await page.setViewportSize({width,height});
              await page.goto(APP,{waitUntil:'domcontentloaded'});
              await page.waitForFunction(()=>Boolean(
                window.BogatkaCardProgressV448?.ready&&
                window.BogatkaLocationCardCollapseV422?.ready&&
                document.querySelector('.location-actions [data-card-recommendation-v448]')&&
                document.querySelector('.progress-card-toggle-v462')
              ),{timeout:30000});
              await page.waitForTimeout(500);
            }

            await open(1600,1100);
            await page.evaluate(()=>document.querySelectorAll('[data-location-card]').forEach(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false})));
            await page.waitForTimeout(250);
            const cards=page.locator('[data-location-card]');
            const boxes=[await cards.nth(0).boundingBox(),await cards.nth(1).boundingBox()].filter(Boolean);
            const x=Math.min(...boxes.map(b=>b.x));
            const y=Math.min(...boxes.map(b=>b.y));
            const right=Math.max(...boxes.map(b=>b.x+b.width));
            const bottom=Math.max(...boxes.map(b=>b.y+b.height));
            await page.screenshot({path:'/tmp/bogatka-pr67-review/01-desktop-two-collapsed-cards.png',clip:{x,y,width:right-x,height:bottom-y}});

            const first=cards.first();
            await first.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            const progress=first.locator('.progress-card-toggle-v462');
            if(await progress.getAttribute('aria-expanded')!=='true')await progress.click();
            await first.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-pr67-review/02-desktop-expanded-progress.png'});

            await open(390,1000);
            const mobile=page.locator('[data-location-card]').first();
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,true,{persist:false}));
            await mobile.locator(':scope > .location-head').screenshot({path:'/tmp/bogatka-pr67-review/03-mobile-location-header-actions.png'});
            await mobile.evaluate(card=>window.BogatkaLocationCardCollapseV422.setCollapsed(card,false,{persist:false}));
            const mobileProgress=mobile.locator('.progress-card-toggle-v462');
            if(await mobileProgress.getAttribute('aria-expanded')!=='true')await mobileProgress.click();
            await mobile.locator('.decision-progress-v448').screenshot({path:'/tmp/bogatka-pr67-review/04-mobile-expanded-progress.png'});
            await browser.close();
          })().catch(error=>{console.error(error);process.exit(1)});
          NODE
          python3 -m http.server 4174 --bind 127.0.0.1 > /tmp/bogatka-screenshot-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4174/bogatka-field-8f3c7d/ >/dev/null && break
            sleep 1
          done
          node capture-pr67.cjs
          rm capture-pr67.cjs

      - name: Commit focused correction and remove runner
        run: |
          rm .github/workflows/bogatka-pr67-visual-correction.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            bogatka-field-8f3c7d/card-progress-v448.js \
            bogatka-field-8f3c7d/card-progress-v448.css \
            bogatka-field-8f3c7d/tests/location-card-collapse-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/location-card-collapse-mobile-v422.spec.mjs \
            bogatka-field-8f3c7d/tests/card-progress-v448.spec.mjs \
            bogatka-field-8f3c7d/tests/ui-refine-v462.spec.mjs \
            bogatka-field-8f3c7d/tests/location-card-polish-v423.spec.mjs \
            .github/workflows/bogatka-pr67-visual-correction.yml
          git commit -m 'Refine status placement and metric guidance'
          git push origin HEAD:ui-recommendation-progress-refine

      - name: Upload targeted evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-pr67-visual-correction-review
          path: |
            /tmp/bogatka-pr67-review
            /tmp/bogatka-targeted-tests.log
            /tmp/bogatka-http.log
            /tmp/bogatka-screenshot-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 7
