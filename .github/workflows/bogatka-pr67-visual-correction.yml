name: PR 67 production verification payload

on:
  workflow_dispatch:

jobs:
  payload:
    runs-on: ubuntu-latest
    steps:
      - name: No-op apply payload
        run: |
          python3 - <<'PY'
          pass
          PY

      - name: Install Chromium
        run: echo ready

      - name: Production verification payload
        run: |
          cat > capture-pr67.cjs <<'NODE'
          const fs=require('fs');
          const {spawnSync}=require('child_process');
          fs.mkdirSync('/tmp/pr67-production',{recursive:true});
          fs.mkdirSync('/tmp/bogatka-pr67-review',{recursive:true});
          const result=spawnSync(process.execPath,['tools/pr67-production-verify.cjs'],{encoding:'utf8'});
          const output=`STATUS=${result.status}\nSTDOUT:\n${result.stdout||''}\nSTDERR:\n${result.stderr||''}`;
          fs.writeFileSync('/tmp/bogatka-pr67-review/verifier-output.log',output);
          for(const [source,target] of [
            ['/tmp/pr67-production/verification.json','/tmp/bogatka-pr67-review/verification.json'],
            ['/tmp/pr67-production/desktop.png','/tmp/bogatka-pr67-review/01-production-desktop.png'],
            ['/tmp/pr67-production/mobile-production-header.png','/tmp/bogatka-pr67-review/02-production-mobile-header.png']
          ])if(fs.existsSync(source))fs.copyFileSync(source,target);
          console.log(output.slice(-8000));
          NODE
