name: Bogatka validation

on:
  push:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: find bogatka-field-8f3c7d -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate feature integration
        run: node bogatka-field-8f3c7d/tests/validate-files.mjs
