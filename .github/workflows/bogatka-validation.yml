name: Bogatka validation

on:
  push:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: find bogatka-field-8f3c7d -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate feature integration
        run: node bogatka-field-8f3c7d/tests/validate-files.mjs

      - name: Validate hardening integration
        run: node bogatka-field-8f3c7d/tests/validate-hardening.mjs

      - name: Validate live report integration
        run: node bogatka-field-8f3c7d/tests/validate-report-live-v427.mjs

      - name: Validate report polish integration
        run: node bogatka-field-8f3c7d/tests/validate-report-polish-v428.mjs

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install browser test dependencies
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1

      - name: Run browser acceptance tests
        id: smoke
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-results.json
        run: |
          mkdir -p test-results
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null; then
              break
            fi
            sleep 1
          done
          npx playwright test bogatka-field-8f3c7d/tests --workers=1 --reporter=json > /tmp/playwright-output.log 2>&1

      - name: Upload browser test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-browser-diagnostics
          path: |
            test-results/playwright-results.json
            /tmp/playwright-output.log
            /tmp/bogatka-http.log
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when browser acceptance tests failed
        if: steps.smoke.outcome != 'success'
        run: |
          echo 'Bogatka browser acceptance tests failed. Diagnostics were uploaded as an artifact.'
          if [ -f test-results/playwright-results.json ]; then
            node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('test-results/playwright-results.json','utf8'));
          for (const suite of report.suites || []) {
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                for (const result of test.results || []) {
                  if (result.status !== 'passed') {
                    console.error(`FAILED: ${spec.title}`);
                    for (const error of result.errors || []) console.error(error.message || error.stack || error);
                  }
                }
              }
            }
          }
          NODE
          fi
          exit 1
