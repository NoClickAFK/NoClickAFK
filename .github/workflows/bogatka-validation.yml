name: Bogatka validation

on:
  push:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: find bogatka-field-8f3c7d -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate feature integration
        run: node bogatka-field-8f3c7d/tests/validate-files.mjs

      - name: Install browser test dependencies
        run: |
          npm install --no-save @playwright/test@1.52.0
          npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null; then
              break
            fi
            sleep 1
          done
          npx playwright test bogatka-field-8f3c7d/tests/browser-smoke.spec.mjs --reporter=line
