name: Clean UI refinement branch artifacts

on:
  push:
    branches: [ui-recommendation-progress-refine]

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-recommendation-progress-refine
          fetch-depth: 0
          persist-credentials: true
      - name: Remove temporary dependency artifacts
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f .github/workflows/cleanup-ui-refinement-branch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary dependency artifacts'
          git push origin HEAD:ui-recommendation-progress-refine
