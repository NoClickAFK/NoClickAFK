name: Bogatka temporary base-head typography proof

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/bogatka-temp-base-head-typography.yml'
      - 'bogatka-field-8f3c7d/tests/temp-base-head-labels.cjs'

permissions:
  contents: read

jobs:
  compare-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare clean base
        run: |
          git fetch --depth=1 origin c1c8b5ef8abc3d8e6582291b1988da8e97be59c5
          mkdir -p /tmp/bogatka-base
          git archive c1c8b5ef8abc3d8e6582291b1988da8e97be59c5 | tar -x -C /tmp/bogatka-base
      - name: Install Chromium
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - name: Measure clean base and PR head
        run: |
          set -o pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/head-http.log 2>&1 &
          HEAD_PID=$!
          python3 -m http.server 4174 --bind 127.0.0.1 --directory /tmp/bogatka-base > /tmp/base-http.log 2>&1 &
          BASE_PID=$!
          trap 'kill $HEAD_PID $BASE_PID' EXIT
          node bogatka-field-8f3c7d/tests/temp-base-head-labels.cjs | tee /tmp/base-head-labels.log
          test -s /tmp/base-head-labels.log
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-base-head-typography-proof
          path: |
            /tmp/base-head-labels.log
            /tmp/head-http.log
            /tmp/base-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 3
