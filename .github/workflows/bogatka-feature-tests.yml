name: Bogatka feature tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/**'
      - '.github/workflows/bogatka-feature-tests.yml'
      - '.github/scripts/resolve-feature-diff-base.sh'
  workflow_dispatch:
    inputs:
      base_sha:
        description: 'Optional comparison base commit SHA. Defaults to the merge base with origin/main, then HEAD^.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: bogatka-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changed-domain-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve changed-file diff base
        id: diff
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          WORKFLOW_INPUT_BASE_SHA: ${{ inputs.base_sha || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: bash .github/scripts/resolve-feature-diff-base.sh

      - name: Select tests for changed domains
        id: select
        run: |
          CHANGED="$(tr '[:upper:]' '[:lower:]' < /tmp/bogatka-changed-files.txt)"
          : > /tmp/selected-tests.txt
          if echo "$CHANGED" | grep -Eq 'location|inspection|landlord|readiness|progress|recommendation|decision-panel|photo-plan|compare'; then
            printf '%s\n' \
              bogatka-field-8f3c7d/tests/readiness-progress-v434.spec.mjs \
              bogatka-field-8f3c7d/tests/readiness-safety-v434.spec.mjs \
              bogatka-field-8f3c7d/tests/inspection-layout-v461.spec.mjs \
              bogatka-field-8f3c7d/tests/launch-gate-v454.spec.mjs \
              bogatka-field-8f3c7d/tests/report-live-v427.spec.js >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'critical-deal|lease'; then
            printf '%s\n' \
              bogatka-field-8f3c7d/tests/critical-deal-bootstrap-v430.spec.mjs \
              bogatka-field-8f3c7d/tests/critical-deal-v430.spec.mjs \
              bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'traffic|competitor'; then
            printf '%s\n' \
              bogatka-field-8f3c7d/tests/traffic-competitors-v453.spec.mjs \
              bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'bogatka-field-8f3c7d/(launch-gate-v454|opening-project-v455|opening-project-persistence-v455)\.(js|css)$'; then
            printf '%s\n' bogatka-field-8f3c7d/tests/launch-gate-v454.spec.mjs bogatka-field-8f3c7d/tests/opening-project-v455.spec.mjs >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'report|pdf'; then
            printf '%s\n' \
              bogatka-field-8f3c7d/tests/browser-workflows.spec.mjs \
              bogatka-field-8f3c7d/tests/report-live-v427.spec.js \
              bogatka-field-8f3c7d/tests/report-polish-v428.spec.js \
              bogatka-field-8f3c7d/tests/report-premium-v433.spec.js \
              bogatka-field-8f3c7d/tests/report-premium-security-v433.spec.js \
              bogatka-field-8f3c7d/tests/report-premium-artifacts-v433.spec.js >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'sync|cloud|stability|archive'; then
            echo "sync_changed=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              bogatka-field-8f3c7d/tests/sync-convergence-v435.spec.mjs \
              bogatka-field-8f3c7d/tests/sync-inflight-edit-v435.spec.mjs \
              bogatka-field-8f3c7d/tests/archive-sync-v436.spec.mjs >> /tmp/selected-tests.txt
          else
            echo "sync_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -Eq 'select'; then
            echo bogatka-field-8f3c7d/tests/browser-select-sync.spec.mjs >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq 'backup|restore'; then
            echo bogatka-field-8f3c7d/tests/release-integrity-v456.spec.mjs >> /tmp/selected-tests.txt
          fi
          if echo "$CHANGED" | grep -Eq '^(\.github/workflows/bogatka-feature-tests\.yml|\.github/scripts/resolve-feature-diff-base\.sh|bogatka-field-8f3c7d/tests/feature-workflow-diff-base\.spec\.mjs)$'; then
            echo "workflow_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_changed=false" >> "$GITHUB_OUTPUT"
          fi
          sort -u /tmp/selected-tests.txt -o /tmp/selected-tests.txt
          COUNT="$(wc -l < /tmp/selected-tests.txt | tr -d ' ')"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          cat /tmp/selected-tests.txt

      - name: Install Chromium and WebKit
        if: steps.select.outputs.count != '0' || steps.select.outputs.workflow_changed == 'true' || steps.select.outputs.sync_changed == 'true'
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium webkit > /tmp/playwright-install.log 2>&1

      - name: Run changed-domain tests
        if: steps.select.outputs.count != '0'
        run: |
          set -o pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null && break
            sleep 1
          done
          xargs -a /tmp/selected-tests.txt npx playwright test --workers=1 --reporter=line 2>&1 | tee /tmp/bogatka-feature-tests.log

      - name: Run sync safety regressions
        if: steps.select.outputs.sync_changed == 'true'
        run: |
          set -o pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 >> /tmp/bogatka-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null && break
            sleep 1
          done
          npx playwright test bogatka-field-8f3c7d/tests/browser-sync-stability.spec.mjs \
            --grep 'automatic sync waits|clean idle state|multiple realtime notifications' \
            --workers=1 --reporter=line 2>&1 | tee /tmp/bogatka-sync-safety-tests.log
          npx playwright test bogatka-field-8f3c7d/tests/sync-integrity-v412.spec.mjs \
            --grep 'three-way merge|first sync unions|archive and restore|permanent deletion|successful cloud deletion|offline tombstone|remote deletion|viewer cannot' \
            --workers=1 --reporter=line 2>&1 | tee -a /tmp/bogatka-sync-safety-tests.log
          npx playwright test bogatka-field-8f3c7d/tests/release-integrity-v456.spec.mjs \
            --grep 'backup contains|field-wise sync merge' \
            --workers=1 --reporter=line 2>&1 | tee -a /tmp/bogatka-sync-safety-tests.log

      - name: Run diff-base resolver regression
        if: steps.select.outputs.workflow_changed == 'true'
        run: |
          set -o pipefail
          npx playwright test bogatka-field-8f3c7d/tests/feature-workflow-diff-base.spec.mjs --workers=1 --reporter=line --output=/tmp/bogatka-workflow-resolver-results 2>&1 | tee /tmp/bogatka-workflow-resolver-tests.log

      - name: Upload archive sync v4.3.6 review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-archive-sync-v436-review-artifacts
          path: review-artifacts/archive-sync-v436-review/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload cloud sync v4.3.5 review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-sync-v435-review-artifacts
          path: review-artifacts/sync-v435-review/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload readiness v4.3.4 review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-readiness-v434-review-artifacts
          path: test-results/readiness-v434-review/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload report export review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-report-v433-review-artifacts
          path: test-results/report-v433-review/**
          if-no-files-found: ignore
          retention-days: 7

      - name: No mapped feature tests
        if: steps.select.outputs.count == '0'
        run: echo "A valid diff was evaluated for ${{ github.event_name }} against base ${{ steps.diff.outputs.base_sha }}; no mapped application domains changed."

      - name: Upload feature diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bogatka-feature-test-diagnostics
          path: |
            /tmp/bogatka-feature-tests.log
            /tmp/bogatka-sync-safety-tests.log
            /tmp/bogatka-workflow-resolver-tests.log
            /tmp/bogatka-http.log
            /tmp/playwright-install.log
          if-no-files-found: warn
          retention-days: 3
