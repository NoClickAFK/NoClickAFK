name: PR73 apply validated baseline

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply-baseline:
    if: github.event.pull_request.number == 73
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: archive-permanent-delete-tombstones
          fetch-depth: 0
      - name: Apply validated corrections and clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/pr73-baseline.patch
          git apply .github/pr73-baseline.patch
          rm .github/pr73-baseline.patch
          rm .github/workflows/pr73-apply-baseline-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Correct full regression baseline assertions'
          git push origin HEAD:archive-permanent-delete-tombstones
