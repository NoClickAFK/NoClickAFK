name: PR73 build corrected tests

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  build-corrected-tests:
    if: github.event.pull_request.number == 73
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: archive-permanent-delete-tombstones
      - name: Apply reviewed baseline corrections in workspace
        shell: bash
        run: |
          set -euo pipefail
          patch -p1 --forward --batch --fuzz=3 < .github/pr73-baseline.patch
          test -z "$(find bogatka-field-8f3c7d/tests -name '*.rej' -print -quit)"
      - name: Upload corrected tests
        uses: actions/upload-artifact@v4
        with:
          name: pr73-corrected-tests
          path: |
            bogatka-field-8f3c7d/tests/card-progress-v448.spec.mjs
            bogatka-field-8f3c7d/tests/critical-deal-v430.spec.mjs
            bogatka-field-8f3c7d/tests/report-live-v427.spec.js
            bogatka-field-8f3c7d/tests/workflow-v414-score-cases.mjs
            bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs
            bogatka-field-8f3c7d/tests/traffic-competitors-v453.spec.mjs
          if-no-files-found: error
          retention-days: 2
