name: PR73 base-head matrix

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: pr73-base-head-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compare-failures:
    if: github.event.pull_request.number == 73
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d6be16e7ecbad08bab49825fa8c54b48f3c60156
          path: base
      - uses: actions/checkout@v4
        with:
          ref: a2bc00ce0e46b63257c1d79cd4fc3b95e9201a00
          path: head
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium and WebKit
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium webkit > /tmp/pr73-browser-install.log 2>&1
      - name: Run exact ten failures on base and head
        shell: bash
        run: |
          set +e
          set -uo pipefail
          mkdir -p /tmp/pr73-matrix

          run_case() {
            local checkout="$1"
            local case_id="$2"
            local file="$3"
            local title="$4"
            local port=4173
            local dir="$GITHUB_WORKSPACE/$checkout"
            local log="/tmp/pr73-matrix/${checkout}-${case_id}.log"
            local json="/tmp/pr73-matrix/${checkout}-${case_id}.json"

            (
              cd "$dir"
              python3 -m http.server "$port" --bind 127.0.0.1 > "/tmp/pr73-matrix/${checkout}-${case_id}-http.log" 2>&1 &
              server_pid=$!
              trap 'kill "$server_pid" 2>/dev/null || true' EXIT
              for attempt in {1..30}; do
                curl --fail --silent "http://127.0.0.1:${port}/bogatka-field-8f3c7d/" >/dev/null && break
                sleep 1
              done
              PLAYWRIGHT_JSON_OUTPUT_NAME="$json" "$GITHUB_WORKSPACE/node_modules/.bin/playwright" test "$file" --grep "^${title}$" --workers=1 --reporter=json > "$log" 2>&1
            )
            rc=$?
            printf '%s\t%s\t%s\n' "$checkout" "$case_id" "$rc" | tee -a /tmp/pr73-matrix/status.tsv
            return 0
          }

          cases=(
            'card-progress|bogatka-field-8f3c7d/tests/card-progress-v448.spec.mjs|all fill-plan buttons use exact section names and open stable targets'
            'critical-deal|bogatka-field-8f3c7d/tests/critical-deal-v430.spec.mjs|ten tailored lease checks are collapsed and use the same accordion presentation'
            'location-evaluation|bogatka-field-8f3c7d/tests/location-evaluation-v446.spec.mjs|comparative evaluation keeps fourteen five-point criteria and the approved wording'
            'report-live|bogatka-field-8f3c7d/tests/report-live-v427.spec.js|live report mirrors the current location DOM and removes editing controls'
            'desktop-line-height|bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs|desktop baseline is unchanged and mobile hierarchy matches the quick checklist reference'
            'marker-transform|bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs|Chromium hides native markers and rotates one custom triangle'
            'webkit-mobile|bogatka-field-8f3c7d/tests/traffic-competitors-v453-integration.spec.mjs|WebKit mobile verifies compact forms and direct Safari marker suppression'
            'traffic-legacy|bogatka-field-8f3c7d/tests/traffic-competitors-v453.spec.mjs|legacy traffic is hidden without migration and structured controls use exact copy'
            'traffic-persistence|bogatka-field-8f3c7d/tests/traffic-competitors-v453.spec.mjs|duration, weather, weekday, summary and independent persistence work'
            'workflow-score|bogatka-field-8f3c7d/tests/workflow-v414-score-cases.mjs|checklist and score explain different decisions'
          )

          for checkout in base head; do
            for row in "${cases[@]}"; do
              IFS='|' read -r case_id file title <<< "$row"
              run_case "$checkout" "$case_id" "$file" "$title"
            done
          done

          python3 - <<'PY'
          import json, pathlib, re
          root=pathlib.Path('/tmp/pr73-matrix')
          rows=[]
          for checkout in ('base','head'):
              for path in sorted(root.glob(f'{checkout}-*.json')):
                  case_id=path.stem[len(checkout)+1:]
                  try:
                      data=json.loads(path.read_text())
                      stats=data.get('stats',{})
                      errors=[]
                      stack=list(data.get('suites',[]))
                      while stack:
                          suite=stack.pop()
                          stack.extend(suite.get('suites',[]))
                          for spec in suite.get('specs',[]):
                              for test in spec.get('tests',[]):
                                  for result in test.get('results',[]):
                                      if result.get('status')=='failed':
                                          msg=(result.get('error') or {}).get('message','')
                                          msg=re.sub(r'\x1b\[[0-9;]*m','',msg)
                                          errors.append(msg[:1000])
                      rows.append({'checkout':checkout,'case':case_id,'stats':stats,'errors':errors})
                  except Exception as exc:
                      rows.append({'checkout':checkout,'case':case_id,'parseError':str(exc)})
          (root/'matrix.json').write_text(json.dumps(rows,ensure_ascii=False,indent=2))
          print((root/'matrix.json').read_text())
          PY
      - name: Upload matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr73-base-head-matrix
          path: |
            /tmp/pr73-matrix
            /tmp/pr73-browser-install.log
          if-no-files-found: error
          retention-days: 7
