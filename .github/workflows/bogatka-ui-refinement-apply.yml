name: Apply Bogatka recommendation UI refinement

on:
  push:
    branches:
      - ui-recommendation-progress-refine

permissions:
  contents: write

jobs:
  apply-test-and-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-recommendation-progress-refine
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply bounded source and test changes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          ROOT=Path('bogatka-field-8f3c7d')

          def read(rel):
              return (ROOT/rel).read_text(encoding='utf-8')

          def write(rel,text):
              (ROOT/rel).write_text(text,encoding='utf-8')

          def replace_once(text,old,new,label):
              count=text.count(old)
              if count!=1:
                  raise SystemExit(f'{label}: expected 1 exact match, found {count}')
              return text.replace(old,new,1)

          def sub_once(text,pattern,repl,label,flags=re.S):
              updated,count=re.subn(pattern,repl,text,count=1,flags=flags)
              if count!=1:
                  raise SystemExit(f'{label}: expected 1 regex match, found {count}')
              return updated

          # Canonical recommendation/progress implementation.
          rel='card-progress-v448.js'
          text=read(rel)
          text=sub_once(text,
              r"  function ensureHeader\(card\)\{.*?\n  \}\n\n  function ensureOverview\(card\)\{",
              """  function ensureHeader(card){
            const scorebox=card.querySelector(':scope > .location-head .scorebox');
            if(scorebox){
              scorebox.hidden=true;
              scorebox.setAttribute('aria-hidden','true');
              scorebox.classList.add('card-metric-hidden-v448');
            }
            const head=card.querySelector(':scope > .location-head .decision-head-v340');
            if(!head)return null;
            if(head.dataset.cardProgressV448!=='1'){
              head.dataset.cardProgressV448='1';
              head.classList.add('card-recommendation-head-v448');
              head.innerHTML='<strong class=\"recommendation-status-v448 empty\" data-card-recommendation-v448>Недостаточно данных</strong>';
            }
            return head;
          }

          function ensureOverview(card){""",
              'replace ensureHeader')

          text=sub_once(text,
              r"  function ensureOverview\(card\)\{.*?\n  \}\n\n  function findDetails\(card,needle\)\{",
              """  function ensureOverview(card){
            const overview=card.querySelector(':scope .decision-overview-v340');
            if(!overview)return null;
            if(overview.dataset.cardProgressV448==='1')return overview;
            overview.dataset.cardProgressV448='1';
            overview.classList.add('decision-progress-v448');
            overview.innerHTML=`
              <div class=\"progress-heading-v448\">
                <div><strong>Общая оценка и готовность данных</strong><span>Здесь видно, насколько подходит локация и сколько данных уже собрано.</span></div>
              </div>
              <div class=\"progress-metrics-v448\">
                <article class=\"progress-metric-v448\"><span>Качество локации</span><strong data-progress-quality-v448>Нет оценки</strong><small data-progress-quality-meta-v448>Оценено 0 из 14 критериев</small></article>
                <article class=\"progress-metric-v448\"><span>Надёжность оценки</span><strong data-progress-coverage-v448>0%</strong><small data-progress-coverage-meta-v448>Оценено 0 из 14 критериев</small></article>
                <article class=\"progress-metric-v448\"><span>Готовность карточки</span><strong data-progress-completion-v448>0%</strong><small data-progress-completion-meta-v448>Заполнено 0 из 7 разделов</small></article>
                <article class=\"progress-metric-v448\"><span>Проверки перед арендой</span><strong data-progress-checks-v448>0 из 10</strong><small data-progress-checks-meta-v448>Проверок завершено</small><small class=\"progress-metric-note-v448\" data-progress-checks-note-v448 hidden></small></article>
              </div>
              <div class=\"quality-scale-v448\" data-quality-scale-v448>
                <div class=\"quality-scale-track-v448\"><span></span><i data-quality-marker-v448></i></div>
                <div class=\"quality-scale-labels-v448\"><span>0–39<br>слабая</span><span>40–59<br>доработать</span><span>60–74<br>перспективная</span><span>75–100<br>сильная</span></div>
              </div>
              <div class=\"score-explanation-v448\"><strong>Как считается качество:</strong> 1 балл = 0, 2 = 25, 3 = 50, 4 = 75, 5 = 100. Вес критериев учитывается. Пустые критерии не занижают качество — они уменьшают надёжность оценки.</div>
              <div class=\"completion-track-v448\"><span data-progress-completion-bar-v448></span></div>
              <div class=\"fill-plan-v448\">
                <div class=\"fill-plan-heading-v448\"><strong>Что заполнить дальше</strong><span data-fill-plan-summary-v448></span></div>
                <div class=\"fill-plan-list-v448\" data-fill-plan-list-v448></div>
              </div>`;
            overview.addEventListener('click',event=>{
              const button=event.target.closest('[data-progress-target-v448]');
              if(button)openTarget(card,button.dataset.progressTargetV448);
            });
            return overview;
          }

          function findDetails(card,needle){""",
              'replace ensureOverview')

          quality_old="""  function qualityBand(score){
            if(score===null||score===undefined)return{label:'Нет оценки',className:'empty'};
            return SCORE_BANDS.find(band=>score<=band.max)||SCORE_BANDS.at(-1);
          }
"""
          quality_new=quality_old+"""
          function setRecommendationStatus(node,recommendation={}){
            if(!node)return;
            const className=recommendation.className||'empty';
            const progressClass=node.classList.contains('progress-card-summary-v462')?' progress-card-summary-v462':'';
            node.className=`recommendation-status-v448 ${className}${progressClass}`;
            node.dataset.recommendationClass=className;
            text(node,recommendation.label||'Недостаточно данных');
          }
"""
          text=replace_once(text,quality_old,quality_new,'insert status helper')

          text=sub_once(text,
              r"  function renderMetric\(card,metric\)\{.*?\n  \}\n\n  function patchSortLabel\(\)\{",
              """  function renderMetric(card,metric){
            const header=ensureHeader(card);
            const overview=ensureOverview(card);
            if(!header||!overview)return;
            const recommendation=metric.recommendation||{label:'Недостаточно данных',className:'empty'};
            setRecommendationStatus(header.querySelector('[data-card-recommendation-v448]'),recommendation);
            setRecommendationStatus(overview.querySelector('[data-progress-card-summary-v462]'),recommendation);

            const quality=metric.qualityScore;
            const band=qualityBand(quality);
            const answered=metric.answeredScores||0;
            text(overview.querySelector('[data-progress-quality-v448]'),quality===null||quality===undefined?'Нет оценки':`${Number.isInteger(quality)?quality:quality.toFixed(1)}/100`);
            text(overview.querySelector('[data-progress-quality-meta-v448]'),`Оценено ${answered} из 14 критериев`);
            text(overview.querySelector('[data-progress-coverage-v448]'),`${Math.round(metric.scoreCoveragePct||0)}%`);
            text(overview.querySelector('[data-progress-coverage-meta-v448]'),`Оценено ${answered} из 14 критериев`);
            text(overview.querySelector('[data-progress-completion-v448]'),`${metric.completion||0}%`);
            text(overview.querySelector('[data-progress-completion-meta-v448]'),`Заполнено ${metric.completedProgressGroups||0} из ${metric.totalProgressGroups||7} разделов`);

            const checksGroup=metric.progressGroups?.find(group=>group.key==='checks');
            const checksDone=checksGroup?.done??Number(metric.stopAnswered||0);
            const checksTotal=checksGroup?.total??10;
            text(overview.querySelector('[data-progress-checks-v448]'),`${checksDone} из ${checksTotal}`);
            text(overview.querySelector('[data-progress-checks-meta-v448]'),'Проверок завершено');
            const checksNote=overview.querySelector('[data-progress-checks-note-v448]');
            const compactText=String(metric.dealGate?.compactText||'').trim();
            const note=compactText==='Нужно письменно'?'Есть пункты без письменного подтверждения':(compactText&&compactText!=='Не проверено'?compactText:'');
            if(checksNote){
              text(checksNote,note);
              checksNote.hidden=!note;
            }

            const scale=overview.querySelector('[data-quality-scale-v448]');
            if(scale){
              scale.dataset.qualityBand=band.className;
              scale.style.setProperty('--quality-position',`${clamp(quality??0,0,100)}%`);
              scale.classList.toggle('empty',quality===null||quality===undefined);
            }
            const completionBar=overview.querySelector('[data-progress-completion-bar-v448]');
            if(completionBar)completionBar.style.width=`${clamp(metric.completion||0,0,100)}%`;
            renderPlan(overview,metric);

            const rank=card.querySelector(`[data-auto-rank=\"${CSS.escape(metric.id)}\"]`);
            if(rank)rank.title='Рейтинг учитывает стоп-факторы, риски, качество и надёжность оценки.';
          }

          function patchSortLabel(){""",
              'replace renderMetric')

          text=sub_once(text,
              r"function syncSummary\(overview\)\{.*?\n\}",
              """function syncSummary(overview){
          const target=overview.querySelector('[data-progress-card-summary-v462]');
          const source=overview.closest('[data-location-card]')?.querySelector('[data-card-recommendation-v448]');
          if(!target||!source)return;
          if(target.textContent!==source.textContent)target.textContent=source.textContent;
          const semantic=source.dataset.recommendationClass||['empty','weak','medium','good','priority','risk','stop'].find(name=>source.classList.contains(name))||'empty';
          target.className=`progress-card-summary-v462 recommendation-status-v448 ${semantic}`;
          target.dataset.recommendationClass=semantic;
          }""",
              'replace syncSummary')

          text=sub_once(text,
              r"function ensureProgress\(card\)\{.*?\n\}\n\nfunction applyLayoutGuards\(card\)\{",
              """function ensureProgress(card){
          const overview=card.querySelector('.decision-overview-v340.decision-progress-v448');
          if(!overview)return false;
          if(overview.dataset.uiRefineV462==='1'){
            ensureFillPlan(overview,card);
            syncSummary(overview);
            return true;
          }
          const heading=overview.querySelector(':scope > .progress-heading-v448');
          if(!heading)return false;
          const titleBlock=heading.querySelector(':scope > div:first-child');
          const content=document.createElement('div');
          content.className='progress-card-content-v462';
          while(overview.firstChild)content.append(overview.firstChild);
          heading.remove();
          const button=document.createElement('button');
          const copy=document.createElement('span');
          const title=document.createElement('strong');
          const note=document.createElement('span');
          const summary=document.createElement('span');
          const arrow=document.createElement('i');
          button.type='button';
          button.className='progress-card-toggle-v462';
          copy.className='progress-card-toggle-copy-v462';
          title.textContent=titleBlock?.querySelector('strong')?.textContent||'Общая оценка и готовность данных';
          note.textContent=titleBlock?.querySelector('span')?.textContent||'Здесь видно, насколько подходит локация и сколько данных уже собрано.';
          summary.className='progress-card-summary-v462 recommendation-status-v448 empty';
          summary.dataset.progressCardSummaryV462='';
          summary.textContent=card.querySelector('[data-card-recommendation-v448]')?.textContent||'Недостаточно данных';
          arrow.className='progress-card-chevron-v462';
          arrow.setAttribute('aria-hidden','true');
          copy.append(title,note);
          button.append(copy,summary,arrow);
          overview.append(button,content);
          const key=`bogatka_progress_open_v462:${card.dataset.locationCard||'location'}`;
          setOpen(button,content,read(key)==='1',null);
          button.addEventListener('click',()=>setOpen(button,content,button.getAttribute('aria-expanded')!=='true',key));
          overview.classList.add('progress-card-v462');
          overview.dataset.uiRefineV462='1';
          ensureFillPlan(overview,card);
          syncSummary(overview);
          return true;
          }

          function applyLayoutGuards(card){""",
              'replace ensureProgress')

          text=sub_once(text,
              r"function applyLayoutGuards\(card\)\{.*?\n\}\n\nasync function syncLegacyStatus",
              """function applyLayoutGuards(card){
          for(const grid of card.querySelectorAll('.inspection-grid-v416,.landlord-grid-v416')){
            grid.style.setProperty('row-gap','12px','important');
            grid.style.setProperty('column-gap','14px','important');
          }
          const selector='.inspection-grid-v416>label.field:not([hidden]):not(.hidden):not(.panel-hidden-v419),.landlord-grid-v416>label.field:not([hidden]):not(.hidden):not(.panel-hidden-v419),.inspection-grid-v416>.next-task-v447';
          for(const field of card.querySelectorAll(selector))field.style.setProperty('gap','5px','important');
          card.querySelector('.progress-metrics-v448')?.style.removeProperty('grid-template-columns');
          }

          async function syncLegacyStatus""",
              'replace applyLayoutGuards')

          text=sub_once(text,
              r"function enhanceCard\(card\)\{.*?\n\}",
              """function enhanceCard(card){
          if(!card?.dataset?.locationCard)return false;
          ensureProgress(card);
          applyLayoutGuards(card);
          return true;
          }""",
              'replace enhanceCard')

          if 'Текущая рекомендация' in text:
              raise SystemExit('card-progress JS still contains the removed header title')
          if 'progress-recommendation-v448' in text:
              raise SystemExit('card-progress JS still contains the removed recommendation card')
          write(rel,text)

          # Canonical stylesheet: one shared semantic chip, compact header and four equal metrics.
          rel='card-progress-v448.css'
          css=read(rel)
          prefix=""".card-metric-hidden-v448{display:none!important}
          .card-recommendation-head-v448{display:flex!important;align-items:flex-start!important;justify-content:flex-end!important;width:auto!important;max-width:100%!important}
          .recommendation-status-v448{display:inline-flex;align-items:center;justify-content:center;width:max-content;max-width:220px;min-height:32px;padding:6px 10px;border:1px solid transparent;border-radius:10px;font-size:11px;font-weight:700;line-height:1.2;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box}
          .recommendation-status-v448.empty{border-color:#e5bcbc;background:#fff1f1;color:#8a3f3f}
          .recommendation-status-v448.weak{border-color:#dda9a9;background:#fbe9e9;color:#873333}
          .recommendation-status-v448.medium,.recommendation-status-v448.risk{border-color:#dfbd68;background:#fff3d4;color:#745009}
          .recommendation-status-v448.good{border-color:#afd2bd;background:#edf8f1;color:#236646}
          .recommendation-status-v448.priority{border-color:#176342;background:#176342;color:#fff}
          .recommendation-status-v448.stop{border-color:#8f2f2f;background:#8f2f2f;color:#fff}
          """
          css=sub_once(css,r"\A.*?(?=\.decision-progress-v448\{)",prefix,'replace recommendation CSS prefix')
          css=sub_once(css,r"\.progress-recommendation-v448\{.*?(?=\.progress-metrics-v448\{)",'','remove progress recommendation CSS')
          css=sub_once(css,
              r"\.progress-metrics-v448\{.*?(?=\.quality-scale-v448\{)",
              """.progress-metrics-v448{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));align-items:stretch;gap:9px}
          .progress-metrics-v448>article{min-width:0;height:100%;display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:12px;border:1px solid #d7e4dc;border-radius:13px;background:#fff;box-sizing:border-box}
          .progress-metrics-v448>article>span{color:#6b7971;font-size:11px;line-height:1.3}
          .progress-metrics-v448>article>strong{color:#174f3a;font-size:18px;font-weight:800;line-height:1.2;overflow-wrap:anywhere}
          .progress-metrics-v448>article>small{color:#74817a;font-size:10px;line-height:1.35}
          .progress-metrics-v448 .progress-metric-note-v448{margin-top:2px;color:#7b5a20;font-size:10px;line-height:1.35}
          .progress-metrics-v448 .progress-metric-note-v448[hidden]{display:none!important}
          """,
              'replace metric CSS')

          marker='/* Consolidated v460 recommendation layer; retained in canonical card-progress-v448.css. */'
          next_marker='/* Consolidated v462 progress/header/layout layer; retained in canonical card-progress-v448.css. */'
          if css.count(marker)!=1 or css.count(next_marker)!=1:
              raise SystemExit('recommendation consolidation markers not found exactly once')
          css=css[:css.index(marker)]+css[css.index(next_marker):]

          css=sub_once(css,
              r"html \.location-head\{align-items:stretch!important\}.*?(?=html \.location-panels-v419)",
              """html .location-head{align-items:flex-start!important}
          html .location-head-side-v422{display:flex!important;align-items:flex-start!important;align-self:auto!important;justify-content:flex-end!important;gap:12px!important;width:auto!important;min-width:0!important;max-width:100%!important;box-sizing:border-box!important}
          html .location-head-side-v422>.decision-head-v340.card-recommendation-head-v448{display:flex!important;align-items:flex-start!important;justify-content:flex-end!important;width:auto!important;max-width:100%!important;min-width:0!important;box-sizing:border-box!important}
          html .location-head-side-v422>.location-collapse-toggle-v422{flex:0 0 auto!important;align-self:flex-start!important;justify-self:auto!important;margin-top:0!important}
          html .location-head-side-v422 .recommendation-status-v448{flex:0 1 auto!important}

          """,
              'replace v462 location header CSS')

          css=re.sub(r'(?m)^[^\n{]*\.card-recommendation-v448[^\n{]*\{[^{}]*\}\s*','',css)
          css=re.sub(r'(?m)^[^\n{]*\.progress-recommendation-v448[^\n{]*\{[^{}]*\}\s*','',css)

          css=sub_once(css,
              r"html \.progress-card-summary-v462\{.*?\n\}",
              """html .progress-card-summary-v462{justify-self:end!important;max-width:220px!important}""",
              'replace progress summary CSS')
          css=re.sub(r"html \.progress-card-content-v462>\.progress-heading-v448\{[^{}]*\}\s*",'',css)
          css=re.sub(r"html \.progress-heading-v448\.progress-heading-compact-v462>div:first-child\{[^{}]*\}\s*",'',css)

          css=css.replace('.progress-metrics-v448{grid-template-columns:minmax(0,1fr)}','.progress-metrics-v448{grid-template-columns:repeat(2,minmax(0,1fr))}')
          css=css.replace('html .decision-progress-v448 .progress-metrics-v448{grid-template-columns:minmax(0,1fr)!important}','html .decision-progress-v448 .progress-metrics-v448{grid-template-columns:repeat(2,minmax(0,1fr))!important}')

          css=css.replace(
              'html .location-head-side-v422{grid-template-columns:minmax(0,1fr) 32px!important;column-gap:9px!important}',
              'html .location-head-side-v422{display:flex!important;justify-content:space-between!important;gap:9px!important}')
          css=re.sub(r"\s*html \.location-head-side-v422>\.decision-head-v340\.card-recommendation-head-v448,\s*html \.card-recommendation-v448\{[^{}]*\}",'\n  html .location-head-side-v422>.decision-head-v340.card-recommendation-head-v448{width:auto!important;max-width:calc(100% - 41px)!important;min-width:0!important}',css)

          mobile_rule="""
          @media(max-width:520px){
            html .decision-progress-v448 .progress-metrics-v448{grid-template-columns:minmax(0,1fr)!important}
          }
          """
          insert_at=css.rfind('@media(max-width:460px)')
          if insert_at<0:
              raise SystemExit('mobile insertion point not found')
          css=css[:insert_at]+mobile_rule+css[insert_at:]

          if '.card-recommendation-v448' in css:
              raise SystemExit('obsolete large header recommendation CSS remains')
          if '.progress-recommendation-v448' in css:
              raise SystemExit('obsolete progress recommendation CSS remains')
          write(rel,css)

          # The URL control is type=url; include it in the canonical input rule instead of adding a field-only override.
          rel='style.css'
          base=read(rel)
          base=replace_once(base,'input[type=text],input[type=date],input[type=time],input[type=number],select,textarea','input[type=text],input[type=url],input[type=date],input[type=time],input[type=number],select,textarea','include URL input in canonical style')
          write(rel,base)

          # Targeted regression updates.
          rel='tests/card-progress-v448.spec.mjs'
          spec=read(rel)
          spec=sub_once(spec,
              r"test\('header separates the recommendation panel from the compact semantic status'.*?\n\}\);\n\n(?=test\('recommendation status changes)",
              """test('header and progress section keep only one compact semantic recommendation status',async({page})=>{
            const card=await openApp(page);
            await expect(card.locator('.card-recommendation-v448')).toHaveCount(0);
            const status=card.locator('[data-card-recommendation-v448]');
            await expect(status).toBeVisible();
            await expect(status).toHaveText('Недостаточно оценок');
            await expect(status).toHaveClass(/empty/);

            const outer=card.locator('.progress-card-toggle-v462');
            if(await outer.getAttribute('aria-expanded')!=='true')await outer.click();
            await expect(card.locator('.progress-card-toggle-copy-v462 strong')).toHaveText('Общая оценка и готовность данных');
            await expect(card.locator('.progress-card-toggle-copy-v462 span')).toHaveText('Здесь видно, насколько подходит локация и сколько данных уже собрано.');
            await expect(card.locator('.progress-recommendation-v448')).toHaveCount(0);
            await expect(card.locator('.progress-metrics-v448>article')).toHaveCount(4);
            const progressStatus=card.locator('[data-progress-card-summary-v462]');
            await expect(progressStatus).toHaveText('Недостаточно оценок');

            const result=await card.evaluate(node=>{
              const headerStatus=node.querySelector('[data-card-recommendation-v448]');
              const progressStatus=node.querySelector('[data-progress-card-summary-v462]');
              const toggle=node.querySelector('.location-collapse-toggle-v422').getBoundingClientRect();
              const statusRect=headerStatus.getBoundingClientRect();
              const metrics=node.querySelector('.progress-metrics-v448');
              const articles=[...metrics.children].map(item=>item.getBoundingClientRect());
              const semantic=['empty','weak','medium','good','priority','risk','stop'];
              return{
                headerClass:semantic.find(name=>headerStatus.classList.contains(name)),
                progressClass:semantic.find(name=>progressStatus.classList.contains(name)),
                statusHeight:Math.round(statusRect.height),
                gapToToggle:Math.round(toggle.left-statusRect.right),
                metricCount:articles.length,
                widthDelta:Math.max(...articles.map(item=>item.width))-Math.min(...articles.map(item=>item.width)),
                metricsCoverage:Math.abs(articles[0].left-metrics.getBoundingClientRect().left)+Math.abs(articles.at(-1).right-metrics.getBoundingClientRect().right),
                headerText:node.querySelector(':scope > .location-head').innerText,
              };
            });
            expect(result.headerClass).toBe(result.progressClass);
            expect(result.statusHeight).toBeGreaterThanOrEqual(30);
            expect(result.gapToToggle).toBeGreaterThanOrEqual(8);
            expect(result.metricCount).toBe(4);
            expect(result.widthDelta).toBeLessThanOrEqual(2);
            expect(result.metricsCoverage).toBeLessThanOrEqual(2);
            expect(result.headerText.toUpperCase()).not.toContain('ТЕКУЩАЯ РЕКОМЕНДАЦИЯ');
            expect(result.headerText).not.toContain('Оцените минимум 5 критериев');
          });

          """,
              'replace card progress header test')

          spec=sub_once(spec,
              r"test\('recommendation status changes semantic color without changing compact geometry'.*?\n\}\);",
              """test('recommendation status changes shared semantic color without changing compact geometry',async({page})=>{
            const card=await openApp(page);
            const id=await card.getAttribute('data-location-card');
            const status=card.locator('[data-card-recommendation-v448]');
