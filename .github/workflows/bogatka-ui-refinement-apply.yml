          write(rel,spec)

          rel='tests/location-card-collapse-mobile-v422.spec.mjs'
          spec=read(rel)
          spec=spec.replace("card?.querySelector('.location-head-side-v422 .card-recommendation-v448')","card?.querySelector('.location-head-side-v422 [data-card-recommendation-v448]')")
          spec=sub_once(spec,
              r"test\('mobile recommendation panel and compact status stay overflow free'.*?\n\}\);\s*$",
              """test('mobile compact recommendation status stays overflow free',async({page})=>{
            await page.setViewportSize({width:390,height:844});
            await page.addInitScript(()=>localStorage.setItem('bogatka_access_authorized_v1','1'));
            await page.goto(APP_URL,{waitUntil:'networkidle'});
            await page.waitForFunction(()=>{
              const card=document.querySelector('[data-location-card]');
              return Boolean(window.BogatkaLocationCardCollapseV422?.ready&&window.BogatkaCardProgressV448?.ready&&card?.querySelector('.location-head-side-v422 [data-card-recommendation-v448]'));
