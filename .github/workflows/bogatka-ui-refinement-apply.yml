          spec=read(rel)
          spec=spec.replace("card?.querySelector('.card-recommendation-v448')","card?.querySelector('[data-card-recommendation-v448]')")
          spec=spec.replace("first.locator('.card-recommendation-v448')","first.locator('[data-card-recommendation-v448]')")
          spec=spec.replace("first.locator('.card-recommendation-v448 > strong')","first.locator('[data-card-recommendation-v448]')")
          spec=spec.replace("reloaded.locator('.card-recommendation-v448')","reloaded.locator('[data-card-recommendation-v448]')")
          spec=spec.replace("card.querySelector('.card-recommendation-v448')","card.querySelector('[data-card-recommendation-v448]')")
          spec=sub_once(spec,
              r"test\('header keeps recommendation copy and compact status as separate visual elements'.*?\n\}\);",
