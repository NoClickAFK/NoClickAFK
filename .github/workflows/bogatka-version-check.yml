name: Bogatka versioning check

on:
  pull_request:
    branches: [main]
    paths:
      - 'bogatka-field-8f3c7d/version-authority-v426.js'
      - 'bogatka-field-8f3c7d/access-version-v400.js'
      - 'bogatka-field-8f3c7d/sw-v340.js'
      - 'bogatka-field-8f3c7d/reset/**'
      - 'bogatka-field-8f3c7d/tests/**'
      - 'supabase/functions/bogatka-version/**'
      - '.github/workflows/bogatka-version-check.yml'

permissions:
  contents: read

concurrency:
  group: bogatka-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  versioning-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: find bogatka-field-8f3c7d -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run static integration checks
        run: |
          node bogatka-field-8f3c7d/tests/validate-files.mjs
          node bogatka-field-8f3c7d/tests/validate-hardening.mjs
      - name: Install browser test dependencies
        run: |
          npm install --no-save --silent @playwright/test@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - name: Run version authority browser regression
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/bogatka-version-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/bogatka-field-8f3c7d/ > /dev/null; then break; fi
            sleep 1
          done
          npx playwright test bogatka-field-8f3c7d/tests/version-authority.spec.js --workers=1
